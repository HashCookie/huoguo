name: 朱富贵自动取号

on:
  workflow_dispatch:
    inputs:
      eat_time:
        description: '想吃到的时间（如 19:30）'
        required: true
        default: '19:30'
      num:
        description: '用餐人数'
        required: false
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'
          - '7'
          - '8'
      store_id:
        description: '门店 ID'
        required: false
        default: '19'

jobs:
  auto-book:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 自动取号
        env:
          BOOK_ACCOUNTS: ${{ secrets.BOOK_ACCOUNTS }}
          BOOK_NUM: ${{ github.event.inputs.num || '2' }}
          BOOK_STORE_ID: ${{ github.event.inputs.store_id || '19' }}
          BOOK_EAT_TIME: ${{ github.event.inputs.eat_time || '19:30' }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          echo "🚀 开始自动取号 - $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
          echo "   人数: $BOOK_NUM | 吃饭时间: $BOOK_EAT_TIME | 门店: $BOOK_STORE_ID"
          pnpm run auto-book
